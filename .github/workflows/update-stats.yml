name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate_stats.py'

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_stats.py

      - name: Push stats to stats branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Preserve generated files before switching branches
          cp stats/github-stats.svg /tmp/github-stats.svg
          cp stats/github-langs.svg /tmp/github-langs.svg

          # Discard working tree changes so git allows the branch switch
          git restore stats/

          # Checkout or create the unprotected stats branch
          git fetch origin
          if git show-ref --quiet refs/remotes/origin/stats; then
            git checkout -b stats origin/stats
          else
            git checkout --orphan stats
            git rm -rf . --quiet
          fi

          cp /tmp/github-stats.svg github-stats.svg
          cp /tmp/github-langs.svg github-langs.svg

          git add github-stats.svg github-langs.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update github stats"
            git push origin stats
          else
            echo "Stats unchanged, nothing to push"
          fi
